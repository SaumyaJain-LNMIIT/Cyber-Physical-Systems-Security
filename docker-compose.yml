version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: cps_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cps_security

  # FastAPI Backend
  api:
    build: .
    container_name: cps_api
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: "mongodb://mongodb:27017"
      DB_NAME: "cps_security"
    volumes:
      - .:/app
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
